# see "man logrotate" for details

# Use root:adm — adm group exists on Ubuntu 22 (syslog group does not)
su root adm

# Keep 4 weeks of rotated logs
rotate 4

# Rotate weekly by default
weekly

# Append date to rotated filename (e.g. syslog-2024-01-15)
dateext
dateformat -%Y-%m-%d

# Create new empty log file after rotating
create

# Compress rotated logs (gzip)
compress

# Delay compression by one rotation cycle (so the just-rotated file
# is still readable without decompressing)
delaycompress

# Do not error if log file is missing
missingok

# Do not rotate empty log files
notifempty

# Use copy+truncate so running processes keep their file handles
copytruncate

# Include per-package drop-in configs
include /etc/logrotate.d

# System logs
/var/log/syslog {
    daily
    rotate 7
    missingok
    notifempty
    compress
    delaycompress
    postrotate
        /usr/lib/rsyslog/rsyslog-rotate
    endscript
}

/var/log/auth.log {
    daily
    rotate 14
    missingok
    notifempty
    compress
    delaycompress
    postrotate
        /usr/lib/rsyslog/rsyslog-rotate
    endscript
}

/var/log/kern.log {
    daily
    rotate 7
    missingok
    notifempty
    compress
    delaycompress
}

/var/log/dpkg.log {
    monthly
    rotate 12
    missingok
    notifempty
    compress
    delaycompress
}

/var/log/apt/history.log {
    monthly
    rotate 12
    missingok
    notifempty
    compress
    delaycompress
}

# wtmp and btmp — binary files, no compression
/var/log/wtmp {
    monthly
    rotate 3
    create 0664 root utmp
    missingok
    notifempty
}

/var/log/btmp {
    monthly
    rotate 3
    create 0660 root utmp
    missingok
    notifempty
}

# Docker container logs
/var/lib/docker/containers/*/*.log {
    daily
    rotate 7
    missingok
    notifempty
    compress
    delaycompress
    copytruncate
    maxsize 100M
}

# Docker daemon log (if using syslog or file driver)
/var/log/docker.log {
    daily
    rotate 7
    missingok
    notifempty
    compress
    delaycompress
    postrotate
        systemctl kill --kill-who=main --signal=HUP docker.service 2>/dev/null || true
    endscript
}

# Application logs under /opt/log
/opt/log/*.log {
    daily
    rotate 7
    missingok
    notifempty
    compress
    delaycompress
    copytruncate
}
